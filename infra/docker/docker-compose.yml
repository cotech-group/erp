version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ina-postgres
    environment:
      POSTGRES_USER: ina
      POSTGRES_PASSWORD: ina_secret
      POSTGRES_DB: ina_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ina -d ina_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ina-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ina-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ina-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  odoo:
    image: odoo:18.0
    container_name: ina-odoo
    depends_on:
      postgres-odoo:
        condition: service_healthy
    environment:
      HOST: postgres-odoo
      USER: odoo
      PASSWORD: odoo_secret
    ports:
      - "8069:8069"

  postgres-odoo:
    image: postgres:16-alpine
    container_name: ina-postgres-odoo
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_secret
      POSTGRES_DB: ina_odoo
    volumes:
      - postgres_odoo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d ina_odoo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_odoo_data:
  minio_data:
